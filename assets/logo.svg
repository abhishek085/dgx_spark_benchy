<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12151c"/>
      <stop offset="100%" stop-color="#1c2130"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="4" y="4" width="248" height="248" rx="40" fill="url(#bg)" stroke="#2a3040" stroke-width="2"/>

  <!-- chip pins -->
  <g stroke="#3a4258" stroke-width="4" stroke-linecap="round">
    <line x1="64" y1="16" x2="64" y2="34"/>
    <line x1="128" y1="16" x2="128" y2="34"/>
    <line x1="192" y1="16" x2="192" y2="34"/>
    <line x1="64" y1="222" x2="64" y2="240"/>
    <line x1="128" y1="222" x2="128" y2="240"/>
    <line x1="192" y1="222" x2="192" y2="240"/>
    <line x1="16" y1="64" x2="34" y2="64"/>
    <line x1="16" y1="128" x2="34" y2="128"/>
    <line x1="16" y1="192" x2="34" y2="192"/>
    <line x1="222" y1="64" x2="240" y2="64"/>
    <line x1="222" y1="128" x2="240" y2="128"/>
    <line x1="222" y1="192" x2="240" y2="192"/>
  </g>

  <!-- chip body -->
  <rect x="44" y="44" width="168" height="168" rx="22" fill="#181c27" stroke="#3a4258" stroke-width="2"/>

  <!-- capacity gauge arc (ceiling concept) -->
  <path d="M 78 158 A 50 50 0 1 1 178 158" fill="none" stroke="#2a3040" stroke-width="10" stroke-linecap="round"/>
  <path d="M 78 158 A 50 50 0 0 1 150 116" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>

  <!-- needle -->
  <line x1="128" y1="158" x2="158" y2="122" stroke="#f4f6fb" stroke-width="5" stroke-linecap="round"/>
  <circle cx="128" cy="158" r="7" fill="#f4f6fb"/>

  <!-- spark bolt through the gauge -->
  <path d="M 136 66 L 108 120 L 126 120 L 118 158 L 154 104 L 134 104 Z"
        fill="url(#accent)" stroke="#0e111a" stroke-width="2" stroke-linejoin="round"/>
</svg>
